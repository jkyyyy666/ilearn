<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- 团子身体渐变 -->
    <radialGradient id="dangoBody" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFF5F9"/>
      <stop offset="45%" stop-color="#FFE4EE"/>
      <stop offset="80%" stop-color="#FFC8DE"/>
      <stop offset="100%" stop-color="#F0A8C8"/>
    </radialGradient>

    <!-- 团子高光 -->
    <radialGradient id="dangoHighlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- 耳朵渐变 -->
    <radialGradient id="earGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFD6E8"/>
      <stop offset="100%" stop-color="#F0A8C8"/>
    </radialGradient>

    <!-- 腮红渐变 -->
    <radialGradient id="blushGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,110,150,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,110,150,0)"/>
    </radialGradient>

    <!-- 阴影 -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 浅色背景 -->
  <rect width="400" height="500" fill="#F0F4FF" rx="20"/>

  <!-- 底部阴影 -->
  <ellipse cx="200" cy="430" rx="70" ry="12" fill="url(#shadowGrad)">
    <animate attributeName="rx" values="70;55;70" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="12;8;12" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 装饰小星星 -->
  <g opacity="0.3">
    <text x="80" y="120" font-size="10" fill="#FFD700">✦
      <animate attributeName="y" values="120;112;120" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="310" y="100" font-size="8" fill="#B8D4FF">✦
      <animate attributeName="y" values="100;93;100" dur="2.5s" repeatCount="indefinite"/>
    </text>
    <text x="70" y="280" font-size="7" fill="#FFB8D8">✦
      <animate attributeName="y" values="280;274;280" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="320" y="300" font-size="9" fill="#FFD700">✦
      <animate attributeName="y" values="300;292;300" dur="2.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ===== 🦶 小脚丫 ===== -->
  <g>
    <ellipse cx="178" cy="398" rx="12" ry="7" fill="#F0A8C8"/>
    <ellipse cx="222" cy="398" rx="12" ry="7" fill="#F0A8C8"/>
  </g>

  <!-- ===== 🍡 团子身体 ===== -->
  <g>
    <!-- 主体 -->
    <ellipse cx="200" cy="300" rx="80" ry="85" fill="url(#dangoBody)">
      <animate attributeName="ry" values="85;83;85" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- 身体高光 -->
    <ellipse cx="175" cy="270" rx="45" ry="40" fill="url(#dangoHighlight)"/>

    <!-- 身体二次高光 -->
    <ellipse cx="165" cy="255" rx="20" ry="12" fill="rgba(255,255,255,0.25)" transform="rotate(-15,165,255)"/>

    <!-- 底部反光 -->
    <ellipse cx="200" cy="365" rx="40" ry="10" fill="rgba(255,200,220,0.15)"/>
  </g>

  <!-- ===== 👂 小圆耳朵 ===== -->
  <g>
    <!-- 左耳 -->
    <circle cx="140" cy="240" r="16" fill="url(#earGrad)">
      <animate attributeName="cy" values="240;236;240" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="138" cy="237" r="6" fill="rgba(255,255,255,0.25)"/>

    <!-- 右耳 -->
    <circle cx="260" cy="240" r="16" fill="url(#earGrad)">
      <animate attributeName="cy" values="240;236;240" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="258" cy="237" r="6" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- ===== ⭐ 星星头饰 ===== -->
  <g filter="url(#glow)">
    <text x="200" y="208" text-anchor="middle" font-size="28" fill="#FFD700" opacity="0.9">
      ⭐
      <animate attributeName="y" values="205;195;205" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- 星星小光芒 -->
  <g fill="#FFE44D" opacity="0.3">
    <circle cx="185" cy="202" r="2"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="215" cy="200" r="1.5"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="216" r="1.5"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== 👁️ 大眼睛 ===== -->
  <g>
    <!-- 左眼 -->
    <ellipse cx="168" cy="295" rx="18" ry="20" fill="#2D1B36"/>
    <!-- 左眼高光 -->
    <circle cx="163" cy="288" r="7" fill="rgba(255,255,255,0.85)"/>
    <circle cx="173" cy="300" r="3" fill="rgba(255,255,255,0.5)"/>
    <!-- 左眼小星光 -->
    <circle cx="162" cy="286" r="2" fill="rgba(255,255,255,0.95)"/>

    <!-- 右眼 -->
    <ellipse cx="232" cy="295" rx="18" ry="20" fill="#2D1B36"/>
    <!-- 右眼高光 -->
    <circle cx="227" cy="288" r="7" fill="rgba(255,255,255,0.85)"/>
    <circle cx="237" cy="300" r="3" fill="rgba(255,255,255,0.5)"/>
    <circle cx="226" cy="286" r="2" fill="rgba(255,255,255,0.95)"/>
  </g>

  <!-- ===== 🥰 腮红 ===== -->
  <g>
    <ellipse cx="132" cy="320" rx="15" ry="9" fill="url(#blushGrad)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="268" cy="320" rx="15" ry="9" fill="url(#blushGrad)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- ===== 😊 微笑 ===== -->
  <path d="M188,320 Q200,328 212,320" fill="none" stroke="#D4607A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 小鼻孔点缀 -->
  <circle cx="197" cy="308" r="1.5" fill="rgba(200,100,130,0.15)"/>
  <circle cx="203" cy="308" r="1.5" fill="rgba(200,100,130,0.15)"/>

  <!-- ===== 👣 小脚（走路状态） ===== -->
  <g opacity="0.3">
    <ellipse cx="168" cy="408" rx="14" ry="6" fill="#F0A8C8" transform="rotate(-10,168,408)">
      <animate attributeName="opacity" values="0;0.3;0;0.3;0" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="232" cy="408" rx="14" ry="6" fill="#F0A8C8" transform="rotate(10,232,408)">
      <animate attributeName="opacity" values="0.3;0;0.3;0;0.3" dur="1s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>