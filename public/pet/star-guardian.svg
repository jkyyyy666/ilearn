<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <!-- 夜空背景 -->
    <radialGradient id="nightSky" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A1A4E"/>
      <stop offset="40%" stop-color="#0F0F3D"/>
      <stop offset="100%" stop-color="#080820"/>
    </radialGradient>

    <!-- 银河光晕 -->
    <radialGradient id="galaxyGlow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="rgba(100,120,255,0.12)"/>
      <stop offset="50%" stop-color="rgba(80,100,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <!-- 云朵渐变 -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFF"/>
      <stop offset="60%" stop-color="#E8EEFF"/>
      <stop offset="100%" stop-color="#D0D8F0"/>
    </linearGradient>

    <!-- 皮肤 -->
    <radialGradient id="skinGrad" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="50%" stop-color="#FFEEE8"/>
      <stop offset="100%" stop-color="#F5E0D8"/>
    </radialGradient>

    <!-- 帽子渐变 -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F8FAFF"/>
      <stop offset="100%" stop-color="#E8ECF8"/>
    </linearGradient>

    <!-- 黄色睡衣 -->
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="40%" stop-color="#FFD84D"/>
      <stop offset="100%" stop-color="#F0C830"/>
    </linearGradient>

    <!-- 星星发光 -->
    <radialGradient id="starGlowBig" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8C4" stop-opacity="0.6"/>
      <stop offset="20%" stop-color="#FFE44D" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>

    <!-- 暖光 -->
    <radialGradient id="warmLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,230,150,0.3)"/>
      <stop offset="30%" stop-color="rgba(255,220,130,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,200,100,0)"/>
    </radialGradient>

    <!-- 眼睛 -->
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3A2060"/>
      <stop offset="40%" stop-color="#1A0E38"/>
      <stop offset="100%" stop-color="#0A0520"/>
    </radialGradient>

    <!-- 昏影 -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,20,0.2)"/>
    </filter>

    <!-- 发光滤镜 -->
    <filter id="glowFilter" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <filter id="tinyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 夜空背景 -->
  <rect width="500" height="600" fill="url(#nightSky)"/>
  <ellipse cx="250" cy="200" rx="300" ry="250" fill="url(#galaxyGlow)"/>

  <!-- 银河光带 -->
  <path d="M0,150 Q150,100 250,180 Q350,260 500,200" fill="none" stroke="rgba(200,180,255,0.06)" stroke-width="80"/>
  <path d="M0,120 Q180,80 280,160 Q380,240 500,180" fill="none" stroke="rgba(180,200,255,0.04)" stroke-width="50"/>

  <!-- ===== 远处小星星 ===== -->
  <g opacity="0.5">
    <circle cx="60" cy="50" r="1.5" fill="#FFD700"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="440" cy="70" r="2" fill="#B8D4FF"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="130" r="1" fill="#FFD700"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="150" r="1.5" fill="#FFB8D8"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="300" r="1" fill="#B8D4FF"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="350" r="1.5" fill="#FFD700"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="450" r="1" fill="#FFB8D8"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="480" r="1.5" fill="#FFD700"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="30" r="1" fill="#FFD700"/>
    <circle cx="320" cy="50" r="1.2" fill="#B8D4FF"/>
    <circle cx="460" cy="250" r="1" fill="#FFD700"/>
  </g>

  <!-- ===== 暖色灯光氛围 ===== -->
  <ellipse cx="250" cy="350" rx="250" ry="200" fill="url(#warmLight)"/>

  <!-- ===== 云朵床 ===== -->
  <g filter="url(#softShadow)">
    <!-- 云朵主体 -->
    <ellipse cx="250" cy="490" rx="170" ry="40" fill="url(#cloudGrad)"/>
    <ellipse cx="150" cy="475" rx="70" ry="35" fill="url(#cloudGrad)"/>
    <ellipse cx="350" cy="475" rx="65" ry="32" fill="url(#cloudGrad)"/>
    <ellipse cx="250" cy="465" rx="90" ry="30" fill="url(#cloudGrad)"/>
    <ellipse cx="180" cy="460" rx="55" ry="25" fill="#F8FAFF"/>
    <ellipse cx="320" cy="462" rx="50" ry="22" fill="#F8FAFF"/>
    <!-- 云朵高光 -->
    <ellipse cx="200" cy="458" rx="40" ry="12" fill="rgba(255,255,255,0.3)"/>
    <ellipse cx="300" cy="460" rx="30" ry="10" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- ===== 身体 + 黄色连体睡衣 ===== -->
  <g filter="url(#softShadow)">
    <!-- 双腿（在睡衣里） -->
    <rect x="195" y="400" width="30" height="50" rx="12" fill="url(#suitGrad)"/>
    <rect x="275" y="400" width="30" height="50" rx="12" fill="url(#suitGrad)"/>

    <!-- 小脚丫 -->
    <ellipse cx="208" cy="452" rx="18" ry="8" fill="#FFEEE8"/>
    <ellipse cx="292" cy="452" rx="18" ry="8" fill="#FFEEE8"/>
    <!-- 脚趾 -->
    <circle cx="216" cy="454" r="3" fill="#F5E0D8"/>
    <circle cx="299" cy="454" r="3" fill="#F5E0D8"/>

    <!-- 身体（睡衣） -->
    <rect x="175" y="330" width="150" height="85" rx="25" fill="url(#suitGrad)"/>

    <!-- 睡衣纽扣 -->
    <circle cx="250" cy="355" r="4" fill="#FFE88C" stroke="#E8C830" stroke-width="1"/>
    <circle cx="250" cy="375" r="4" fill="#FFE88C" stroke="#E8C830" stroke-width="1"/>
    <circle cx="250" cy="395" r="4" fill="#FFE88C" stroke="#E8C830" stroke-width="1"/>

    <!-- 睡衣领口 -->
    <path d="M215,330 Q220,325 225,330 Q250,320 275,330 Q280,325 285,330" fill="none" stroke="#E8C830" stroke-width="2"/>
    <path d="M215,330 Q250,345 285,330" fill="#FFF8F0" stroke="#E8C830" stroke-width="1.5"/>

    <!-- 睡衣口袋 -->
    <path d="M220,380 Q250,390 280,380" fill="none" stroke="rgba(200,170,50,0.3)" stroke-width="1.5"/>

    <!-- 睡衣高光 -->
    <ellipse cx="220" cy="365" rx="25" ry="20" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- ===== 左手臂（垂放） ===== -->
  <g filter="url(#softShadow)">
    <path d="M175,355 Q150,380 155,410 Q158,420 168,415"
      fill="none" stroke="url(#suitGrad)" stroke-width="26" stroke-linecap="round"/>
    <!-- 小手 -->
    <ellipse cx="163" cy="415" rx="10" ry="7" fill="#FFEEE8" transform="rotate(-10,163,415)"/>
  </g>

  <!-- ===== 右手臂（抱着星星） ===== -->
  <g filter="url(#softShadow)">
    <path d="M325,355 Q345,370 340,390 Q338,398 330,395"
      fill="none" stroke="url(#suitGrad)" stroke-width="26" stroke-linecap="round"/>
    <!-- 小手 -->
    <ellipse cx="333" cy="396" rx="10" ry="7" fill="#FFEEE8" transform="rotate(10,333,396)"/>
  </g>

  <!-- ===== 怀里的发光大星星 ===== -->
  <g filter="url(#glowFilter)">
    <circle cx="248" cy="400" r="50" fill="url(#starGlowBig)"/>
    <circle cx="248" cy="400" r="35" fill="url(#starGlowBig)"/>
  </g>
  <g filter="url(#softShadow)">
    <!-- 星星本体 -->
    <text x="248" y="413" text-anchor="middle" font-size="45" fill="#FFD700" opacity="0.9">★</text>
    <!-- 星星内发光 -->
    <text x="248" y="413" text-anchor="middle" font-size="40" fill="#FFF8C4" opacity="0.4">★</text>
  </g>
  <!-- 光芒射线 -->
  <g opacity="0.25">
    <line x1="248" y1="345" x2="248" y2="325" stroke="#FFE44D" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="248" y1="455" x2="248" y2="475" stroke="#FFE44D" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="193" y1="400" x2="173" y2="400" stroke="#FFE44D" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="303" y1="400" x2="323" y2="400" stroke="#FFE44D" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <line x1="210" y1="362" x2="198" y2="350" stroke="#FFE44D" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="286" y1="362" x2="298" y2="350" stroke="#FFE44D" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="210" y1="438" x2="198" y2="450" stroke="#FFE44D" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="286" y1="438" x2="298" y2="450" stroke="#FFE44D" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ===== 圆圆的大脑袋 ===== -->
  <g filter="url(#softShadow)">
    <!-- 后发/帽底 -->
    <ellipse cx="250" cy="225" rx="75" ry="20" fill="#FFF0E8" opacity="0.3"/>

    <!-- 头部 -->
    <circle cx="250" cy="240" r="80" fill="url(#skinGrad)"/>

    <!-- 皮肤高光 -->
    <ellipse cx="230" cy="215" rx="28" ry="14" fill="rgba(255,255,255,0.3)" transform="rotate(-15,230,215)"/>

    <!-- ===== 白色星星睡帽 ===== -->
    <!-- 帽子主体 -->
    <path d="M172,240 Q170,180 190,155 Q210,135 250,120 Q290,135 310,155 Q330,180 328,240 Q310,225 250,220 Q190,225 172,240Z"
      fill="url(#capGrad)" stroke="rgba(200,210,240,0.3)" stroke-width="1"/>

    <!-- 帽子褶皱 -->
    <path d="M200,150 Q220,165 240,155" fill="none" stroke="rgba(200,210,240,0.2)" stroke-width="1.5"/>
    <path d="M260,145 Q280,160 300,150" fill="none" stroke="rgba(200,210,240,0.2)" stroke-width="1.5"/>
    <path d="M190,200 Q220,190 250,195" fill="none" stroke="rgba(200,210,240,0.15)" stroke-width="1"/>
    <path d="M260,195 Q290,190 310,200" fill="none" stroke="rgba(200,210,240,0.15)" stroke-width="1"/>

    <!-- 帽子高光 -->
    <path d="M195,170 Q210,145 240,135" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>

    <!-- 帽沿卷边 -->
    <path d="M172,240 Q185,228 210,222 Q235,218 250,218 Q265,218 290,222 Q315,228 328,240"
      fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M172,240 Q185,232 210,226 Q235,222 250,222 Q265,222 290,226 Q315,232 328,240"
      fill="none" stroke="rgba(200,210,240,0.15)" stroke-width="2"/>

    <!-- 帽尖星星 -->
    <g filter="url(#glowFilter)">
      <text x="250" y="112" text-anchor="middle" font-size="22" fill="#FFD700" opacity="0.9">★</text>
    </g>
    <!-- 帽子挂坠小星星 -->
    <g opacity="0.4">
      <text x="250" y="100" text-anchor="middle" font-size="8" fill="#FFD700">✦</text>
    </g>

    <!-- ===== 眼睛 ===== -->
    <!-- 左眼 -->
    <ellipse cx="220" cy="248" rx="18" ry="20" fill="url(#eyeGrad)"/>
    <!-- 左眼星芒 -->
    <ellipse cx="218" cy="245" rx="14" ry="16" fill="none" stroke="rgba(180,180,255,0.1)" stroke-width="0.5"/>
    <circle cx="215" cy="240" r="2" fill="rgba(200,200,255,0.3)"/>
    <circle cx="225" cy="252" r="1.5" fill="rgba(255,200,255,0.2)"/>
    <!-- 左眼主高光（水汪汪） -->
    <circle cx="215" cy="240" r="6" fill="rgba(255,255,255,0.9)"/>
    <!-- 左眼副高光 -->
    <circle cx="226" cy="253" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <!-- 左眼下睫毛 -->
    <path d="M208,260 Q212,264 216,262" fill="none" stroke="rgba(60,30,80,0.15)" stroke-width="1"/>
    <path d="M224,264 Q228,266 232,262" fill="none" stroke="rgba(60,30,80,0.15)" stroke-width="1"/>

    <!-- 右眼 -->
    <ellipse cx="280" cy="248" rx="18" ry="20" fill="url(#eyeGrad)"/>
    <!-- 右眼星芒 -->
    <ellipse cx="278" cy="245" rx="14" ry="16" fill="none" stroke="rgba(180,180,255,0.1)" stroke-width="0.5"/>
    <circle cx="275" cy="240" r="2" fill="rgba(200,200,255,0.3)"/>
    <circle cx="285" cy="252" r="1.5" fill="rgba(255,200,255,0.2)"/>
    <!-- 右眼主高光 -->
    <circle cx="275" cy="240" r="6" fill="rgba(255,255,255,0.9)"/>
    <!-- 右眼副高光 -->
    <circle cx="286" cy="253" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <!-- 右眼下睫毛 -->
    <path d="M268,260 Q272,264 276,262" fill="none" stroke="rgba(60,30,80,0.15)" stroke-width="1"/>
    <path d="M284,264 Q288,266 292,262" fill="none" stroke="rgba(60,30,80,0.15)" stroke-width="1"/>

    <!-- ===== 水汪汪眼睛底纹 ===== -->
    <ellipse cx="220" cy="248" rx="20" ry="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    <ellipse cx="280" cy="248" rx="20" ry="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

    <!-- ===== 苹果肌/腮红 ===== -->
    <ellipse cx="195" cy="265" rx="16" ry="10" fill="rgba(255,140,160,0.2)"/>
    <ellipse cx="305" cy="265" rx="16" ry="10" fill="rgba(255,140,160,0.2)"/>

    <!-- 苹果肌高光 -->
    <ellipse cx="198" cy="262" rx="6" ry="3" fill="rgba(255,180,200,0.15)"/>
    <ellipse cx="302" cy="262" rx="6" ry="3" fill="rgba(255,180,200,0.15)"/>

    <!-- ===== 微笑 ===== -->
    <path d="M236,272 Q250,282 264,272" fill="none" stroke="#D07080" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 嘴角小窝 -->
    <ellipse cx="234" cy="273" rx="2" ry="1.5" fill="rgba(200,80,110,0.1)"/>
    <ellipse cx="266" cy="273" rx="2" ry="1.5" fill="rgba(200,80,110,0.1)"/>

    <!-- ===== 婴儿肥肉嘟嘟 ===== -->
    <ellipse cx="188" cy="260" rx="10" ry="8" fill="rgba(255,200,190,0.08)"/>
    <ellipse cx="312" cy="260" rx="10" ry="8" fill="rgba(255,200,190,0.08)"/>
  </g>

  <!-- ===== 漂浮的小星星（围绕精灵） ===== -->
  <g filter="url(#tinyGlow)">
    <text x="120" y="280" font-size="16" fill="#FFD700" opacity="0.7">✦
      <animate attributeName="y" values="280;270;280" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="370" y="250" font-size="14" fill="#FFE44D" opacity="0.6">★
      <animate attributeName="y" values="250;240;250" dur="2.5s" repeatCount="indefinite"/>
    </text>
    <text x="100" y="380" font-size="12" fill="#B8D4FF" opacity="0.5">✧
      <animate attributeName="y" values="380;370;380" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="400" y="350" font-size="15" fill="#FFD700" opacity="0.6">✦
      <animate attributeName="y" values="350;340;350" dur="2.8s" repeatCount="indefinite"/>
    </text>
    <text x="140" y="200" font-size="10" fill="#FFB8D8" opacity="0.5">✦
      <animate attributeName="y" values="200;192;200" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="360" y="180" font-size="11" fill="#FFD700" opacity="0.5">✧
      <animate attributeName="y" values="180;172;180" dur="3.2s" repeatCount="indefinite"/>
    </text>
    <text x="380" y="430" font-size="10" fill="#B8D4FF" opacity="0.4">✦
      <animate attributeName="y" values="430;422;430" dur="2.7s" repeatCount="indefinite"/>
    </text>
    <text x="110" y="440" font-size="9" fill="#FFD700" opacity="0.4">✦
      <animate attributeName="y" values="440;432;440" dur="3.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 小光点 -->
  <g opacity="0.3">
    <circle cx="160" cy="320" r="2" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="300" r="1.5" fill="#B8D4FF">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="420" r="1.5" fill="#FFB8D8">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="390" r="2" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>